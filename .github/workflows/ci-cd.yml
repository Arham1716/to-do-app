name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io # Change to docker.io if using Docker Hub
  IMAGE_FRONTEND: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
  IMAGE_BACKEND: ${{ env.REGISTRY }}/${{ github.repository }}/backend
  TAG: ${{ github.sha }}

jobs:
  # -------------------
  # Stage 1: Build
  # -------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -t $IMAGE_FRONTEND:$TAG ./frontend

      - name: Build backend image
        run: docker build -t $IMAGE_BACKEND:$TAG ./backend

  # -------------------
  # Stage 2: Test
  # -------------------
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run frontend tests
        run: docker run --rm $IMAGE_FRONTEND:$TAG npm test

      - name: Run backend tests
        run: docker run --rm $IMAGE_BACKEND:$TAG npm test

  # -------------------
  # Stage 3: Push Docker Images
  # -------------------
  push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push frontend image
        run: docker push $IMAGE_FRONTEND:$TAG

      - name: Push backend image
        run: docker push $IMAGE_BACKEND:$TAG

  # -------------------
  # Stage 4: Deploy to Server
  # -------------------
  deploy:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd /home/abdullah/to-do-app &&
            docker-compose pull &&
            docker-compose up -d --remove-orphans
          "
