services:
  backend:
    image: ghcr.io/arham1716/todo-backend:latest
    container_name: todo-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: user
      DB_PASSWORD: password
      DB_NAME: todo
      CORS_ORIGIN: "*"
    depends_on:
      - db
    networks:
      - todo-network

  frontend:
    image: ghcr.io/arham1716/todo-frontend:latest
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    networks:
      - todo-network

  db:
    image: postgres:16
    container_name: todo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - todo-network

networks:
  todo-network:

volumes:
  pgdata: