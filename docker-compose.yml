services:
  nginx:
    image: nginx:latest
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - todo-network

  backend:
    image: ghcr.io/arham1716/todo-backend:latest
    container_name: todo-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: user
      DB_PASSWORD: password
      DB_NAME: todo
      CORS_ORIGIN: "*"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo-network

  frontend:
    image: ghcr.io/arham1716/todo-frontend:latest
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - todo-network

  db:
    image: postgres:16
    container_name: todo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d todo"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - todo-network

networks:
  todo-network:

volumes:
  pgdata: