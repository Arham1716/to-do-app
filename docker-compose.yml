services:
  backend:
    build: ./backend
    container_name: todo-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: user
      DB_PASSWORD: password
      DB_NAME: todo
      # Allow frontend origin when accessed via VM IP (e.g. http://192.168.1.100:3000). Use "*" to allow any.
      CORS_ORIGIN: "*"
    depends_on:
      - db
    networks:
      - todo-network

  frontend:
    build: ./frontend
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    networks:
      - todo-network

  db:
    image: postgres:16
    container_name: todo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo
    # Expose 5432 only if you need to connect from host (e.g. psql). For production, remove to keep DB internal.
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - todo-network

networks:
  todo-network:

volumes:
  pgdata: